name: Auto Update Packages
on:
  schedule:
    - cron: '0 */3 * * *' # Run every 3 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update_packages:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Generate and Pack Chocolatey Packages
        run: .\Generate-Packages.ps1 -TargetUrls "${{ vars.TARGET_URLS }}"
        shell: powershell

      - name: Push to MyGet
        env:
          MYGET_API_KEY: ${{ secrets.MYGET_API_KEY }}
          MYGET_PUSH_SOURCE_URL: ${{ vars.MYGET_PUSH_SOURCE_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:MYGET_API_KEY)) {
            throw "Repository secret MYGET_API_KEY is not set."
          }

          if ([string]::IsNullOrWhiteSpace($env:MYGET_PUSH_SOURCE_URL)) {
            throw "Repository variable MYGET_PUSH_SOURCE_URL is not set. Example: https://www.myget.org/F/YOUR-FEED-NAME/api/v2/package"
          }

          # The packages were created directly inside the auto-generated folders under ./packages
          if (Test-Path ".\packages") {
            Get-ChildItem -Path ".\packages" -Recurse -Filter "*.nupkg" | ForEach-Object {
              Write-Host "Pushing $($_.Name)..."
              choco push $_.FullName --source $env:MYGET_PUSH_SOURCE_URL --api-key $env:MYGET_API_KEY --force
            }
          } else {
            Write-Host "No packages directory found. Nothing to push."
          }
        shell: powershell

      - name: Keep workflow alive natively
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: Auto keepalive to prevent 60-day cron deactivation"
          git push
        shell: bash
